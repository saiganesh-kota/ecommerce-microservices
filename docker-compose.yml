version: '3.9'

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: shopwave_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: shopwave
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - shopwave_net

  # ── Redis (session cache) ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shopwave_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - shopwave_net

  # ── Node.js Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopwave_backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      NODE_ENV:          production
      PORT:              5000
      MONGO_URI:         mongodb://mongo:27017/shopwave
      REDIS_URL:         redis://redis:6379
      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRE:        7d
      JWT_REFRESH_SECRET:${JWT_REFRESH_SECRET}
      CLIENT_URL:        ${CLIENT_URL:-http://localhost:3000}
      ML_SERVICE_URL:    http://ml:8000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - shopwave_net

  # ── Python ML Service ─────────────────────────────────────────────────────────
  ml:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: shopwave_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - shopwave_net

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
        REACT_APP_ML_URL:  ${REACT_APP_ML_URL:-http://localhost:8000}
    container_name: shopwave_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - shopwave_net

volumes:
  mongo_data:

networks:
  shopwave_net:
    driver: bridge
